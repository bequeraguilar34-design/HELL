<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ECHO-Sync | Registro Real</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">ECHO-Sync</div>
            <ul class="nav-links">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="productos.html">Productos</a></li>
                <li><a href="contactos.html">Contacto</a></li>
                <li><a href="registros.html">Registro</a></li>
            </ul>
        </nav>
    </header>

    <main class="hero-container" style="height: auto; padding: 50px 0;">
        <h2 class="text-vertical">ECHO-SYNC</h2>
        
        <div class="form-container">
            <h2 style="text-align: center; color: var(--primary);">Formulario de Registro</h2>
            <form id="formRegistroReal">
                <input type="text" id="regUser" placeholder="Nombre de usuario" required>
                <input type="email" id="regEmail" placeholder="Correo electrónico" required>
                <input type="password" id="regPass" placeholder="Contraseña" required>
                <button type="submit" style="width: 100%;">Crear Cuenta</button>
            </form>
            
            <div id="msgExito" style="display:none; text-align: center; margin-top: 20px;">
                <p style="color: lime; font-weight: bold;">¡Gracias por preferir ECHO-Sync!</p>
                <p>Tu cuenta ha sido indexada correctamente.</p>
            </div>
        </div>

        <h2 class="text-vertical">REGISTRO</h2>
    </main>

    <script src="script.js"></script>
</body>
</html>
